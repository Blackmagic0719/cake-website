<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Bakeit</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="scripts/firebase-config.js"></script>
</head>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        background: url('images/bg.png') no-repeat center/cover;
        animation: moveBg 20s infinite alternate ease-in-out;
        display: flex;
        flex-direction: column;
    }

    @keyframes moveBg {
        0% {
            background-position: center top;
        }

        100% {
            background-position: center bottom;
        }
    }

    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 40px;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .logo img {
        height: 40px;
    }

    .logo span {
        font-weight: 700;
        color: #ff5c7a;
    }

    .container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .box {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(15px);
        padding: 35px;
        border-radius: 20px;
        width: 380px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        text-align: center;
    }

    .input-row {
        display: flex;
        gap: 10px;
    }

    input {
        width: 100%;
        padding: 14px;
        margin: 10px 0;
        border-radius: 10px;
        border: 1px solid #ddd;
        outline: none;
    }

    input:focus {
        border-color: #ff5c7a;
    }

    button {
        width: 100%;
        padding: 14px;
        background: #ff5c7a;
        color: white;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        font-weight: 600;
        margin-top: 10px;
        transition: 0.3s;
    }

    button:hover {
        background: #e14a68;
    }

    a {
        display: block;
        margin-top: 15px;
        color: #ff5c7a;
        text-decoration: none;
        font-size: 14px;
    }

    footer {
        text-align: center;
        padding: 10px;
        background: rgba(255, 255, 255, 0.8);
        font-size: 12px;
    }

    /* OTP Modal Styling */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: 1000;
    }

    .modal-content {
        background: white;
        width: 320px;
        margin: 100px auto;
        padding: 30px;
        border-radius: 15px;
        text-align: center;
    }
</style>
</head>

<body>

    <header>
        <div class="logo">
            <a href="index.html"><img src="images/logo.png"></a>
            <span>Bakeit</span>
        </div>
    </header>

    <div class="container">
        <div class="box">
            <h2>Create Account</h2>

            <div class="input-row">
                <input type="text" id="first" placeholder="First Name">
                <input type="text" id="last" placeholder="Last Name">
            </div>

            <input type="email" id="email" placeholder="Email">
            <input type="text" id="mobile" placeholder="Mobile Number" maxlength="10">
            <input type="password" id="pass" placeholder="Password (Min 6 chars)" maxlength="15">
            <input type="password" id="confirm" placeholder="Confirm Password">

            <button onclick="startSignup()">Sign Up</button>
            <a href="login.html">Already have an account? Login</a>
        </div>
    </div>

    <div id="otpModal" class="modal">
        <div class="modal-content">
            <h3>Verify Email</h3>
            <p style="font-size: 13px; color: #666; margin: 10px 0;">We've "sent" a 6-digit code to your email.</p>
            <input type="text" id="otpInput" placeholder="Enter 6-digit OTP" maxlength="6"
                style="text-align: center; font-size: 20px; letter-spacing: 5px;">
            <button onclick="verifyOTP()">Verify & Create Account</button>
            <button onclick="closeModal()" style="background:none; color:#999; font-size:12px;">Cancel</button>
        </div>
    </div>

    <script>
        let generatedOTP = null;
        let tempUserData = null;

        function startSignup() {
            let first = document.getElementById("first").value.trim();
            let last = document.getElementById("last").value.trim();
            let email = document.getElementById("email").value.trim();
            let mobile = document.getElementById("mobile").value.trim();
            let pass = document.getElementById("pass").value;
            let confirm = document.getElementById("confirm").value;

            // 1. Validations
            if (!first || !last || !email || !mobile || !pass) {
                alert("Please fill all fields!");
                return;
            }

            if (!email.includes("@") || !email.includes(".")) {
                alert("Invalid email format!");
                return;
            }

            if (mobile.length !== 10 || isNaN(mobile)) {
                alert("Mobile number must be 10 digits!");
                return;
            }

            if (pass.length < 6 || !/[A-Z]/.test(pass) || !/[0-9]/.test(pass)) {
                alert("Password must be 6+ chars, include 1 Uppercase and 1 Number!");
                return;
            }

            if (pass !== confirm) {
                alert("Passwords do not match!");
                return;
            }

            // 2. Check Duplicate
            let users = JSON.parse(localStorage.getItem("users")) || [];
            if (users.find(u => u.email === email)) {
                alert("Email already registered!");
                return;
            }

            // 3. Store temporary data and trigger OTP
            tempUserData = { first, last, email, mobile, pass, image: "", isVerified: false };
            generatedOTP = Math.floor(100000 + Math.random() * 900000);

            // Simulation Alert
            alert("📧 EMAIL SIMULATION\nTo: " + email + "\nYour Bakeit Verification Code is: " + generatedOTP);

            document.getElementById("otpModal").style.display = "block";
        }

        function verifyOTP() {
            let userEntered = document.getElementById("otpInput").value;

            if (userEntered == generatedOTP) {
                let users = JSON.parse(localStorage.getItem("users")) || [];
                tempUserData.isVerified = true;
                users.push(tempUserData);
                localStorage.setItem("users", JSON.stringify(users));

                alert("Verification Successful 🎉");
                window.location.href = "login.html";
            } else {
                alert("❌ Invalid OTP. Please try again.");
            }
        }

        function closeModal() {
            document.getElementById("otpModal").style.display = "none";
            generatedOTP = null;
            tempUserData = null;
        }
    </script>

    <footer>
        © 2026 Bakeit Cake Shop
    </footer>

</body>

</html>
