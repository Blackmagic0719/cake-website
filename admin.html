<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakeit Admin Panel</title>
    <link rel="stylesheet" href="style/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #fff7f8;
        }

        /* HEADER */
        header {
            background: #ff5c7a;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
        }

        /* CONTAINER */
        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        /* CARD */
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        /* INPUT */
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        /* BUTTON */
        button {
            background: #ff5c7a;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        /* PRODUCT */
        .product {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .product img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        /* DROP AREA */
        .drop-area {
            border: 2px dashed #ff5c7a;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
        }

        .drop-area:hover {
            background: #fff0f3;
        }

        /* ORDER */
        .order {
            background: #fafafa;
            padding: 15px;
            margin-top: 10px;
            border-radius: 10px;
            line-height: 1.6;
        }

        .order strong {
            font-size: 16px;
        }

        .status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
        }

        .pending {
            background: orange;
            color: white;
        }

        .delivered {
            background: green;
            color: white;
        }
    </style>
</head>

<body>

    <header
        style="display:flex;justify-content:space-between;align-items:center;padding:15px;background:#ff5c7a;color:white;">

        <span style="font-weight:600;">🍰 Bakeit Admin Dashboard</span>

        <button onclick="goHome()" style="
    background:white;
    color:#ff5c7a;
    padding:8px 15px;
    border-radius:20px;
    border:none;
    cursor:pointer;
    font-weight:500;
  ">
            Home
        </button>

    </header>

    <div class="container">

        <!-- ADD PRODUCT -->
        <div class="card">
            <h2>Add Product</h2>

            <input type="text" id="name" placeholder="Product Name">
            <input type="number" id="price" placeholder="Price">
            <input type="text" id="category" placeholder="Category">

            <div id="dropArea" class="drop-area">
                Drag & Drop Image OR Click
                <input type="file" id="fileInput" hidden>
            </div>

            <img id="preview" style="width:100px;margin-top:10px;display:none;">

            <button onclick="addProduct()">Add Product</button>
        </div>

        <!-- PRODUCT LIST -->
        <div class="card">
            <h2>Products</h2>
            <div id="productList"></div>
        </div>

        <!-- ORDERS -->
        <div class="card">
            <h2>Orders</h2>
            <div id="orderList"></div>
        </div>
        <div class="card">
            <h2>Notifications</h2>
            <div id="notifyList"></div>
            <button onclick="clearNotify()">Clear</button>
        </div>

    </div>


    <script>
        let products = JSON.parse(localStorage.getItem("products")) || [];
        let orders = JSON.parse(localStorage.getItem("orders")) || [];

        let imageData = "";

        /* DRAG & DROP */
        let dropArea = document.getElementById("dropArea");
        let fileInput = document.getElementById("fileInput");
        let preview = document.getElementById("preview");

        dropArea.onclick = () => fileInput.click();

        fileInput.addEventListener("change", handleFile);

        dropArea.addEventListener("dragover", e => e.preventDefault());

        dropArea.addEventListener("drop", e => {
            e.preventDefault();
            let file = e.dataTransfer.files[0];
            handleFile({ target: { files: [file] } });
        });

        function handleFile(e) {
            let file = e.target.files[0];
            let reader = new FileReader();

            reader.onload = function (event) {
                imageData = event.target.result;
                preview.src = imageData;
                preview.style.display = "block";
            };

            reader.readAsDataURL(file);
        }

        /* ADD PRODUCT */
        function addProduct() {
            let name = document.getElementById("name").value;
            let price = document.getElementById("price").value;
            let category = document.getElementById("category").value;

            if (!name || !price || !category || !imageData) {
                alert("Fill all fields!");
                return;
            }

            products.push({ name, price, category, image: imageData });
            localStorage.setItem("products", JSON.stringify(products));

            displayProducts();
        }

        /* DISPLAY PRODUCTS */
        function displayProducts() {
            let list = document.getElementById("productList");
            list.innerHTML = "";

            products.forEach((p, i) => {
                list.innerHTML += `
      <div class="product">
        <div>
          <img src="${p.image}">
          <strong>${p.name}</strong><br>
          Rs.${p.price}
        </div>

        <div>
          <button onclick="editProduct(${i})">Edit</button>
          <button onclick="deleteProduct(${i})" style="background:red;">Delete</button>
        </div>
      </div>
    `;
            });
        }

        /* EDIT */
        function editProduct(i) {
            let newPrice = prompt("New Price:");
            if (newPrice) {
                products[i].price = newPrice;
                localStorage.setItem("products", JSON.stringify(products));
                displayProducts();
            }
        }

        /* DELETE */
        function deleteProduct(i) {
            if (confirm("Delete product?")) {
                products.splice(i, 1);
                localStorage.setItem("products", JSON.stringify(products));
                displayProducts();
            }
        }

        /* DISPLAY ORDERS */
        function displayOrders() {
            let list = document.getElementById("orderList");
            list.innerHTML = "";

            if (orders.length === 0) {
                list.innerHTML = "<p>No orders yet</p>";
                return;
            }

            orders.forEach((o, i) => {
                list.innerHTML += `
      <div class="order">

        <strong>${o.name}</strong><br>

        📞 ${o.mobile}<br>
        📍 ${o.address}<br>
        📮 ${o.postal}<br>

        💰 Total: Rs.${o.total}<br>

        🚚 Delivery: ${o.delivery || "Not set"}<br>

        Status:
        <span class="status ${o.status === 'Delivered' ? 'delivered' : 'pending'}">
          ${o.status || "Pending"}
        </span>

        <br><br>

        <input type="date" onchange="setDelivery(${i}, this.value)">

        <button onclick="markDelivered(${i})">Mark Delivered</button>

        <button onclick="deleteOrder(${i})" style="background:red;">
          Delete Order
        </button>

      </div>
    `;
            });
        }

        /* DELIVERY DATE */
        function setDelivery(i, date) {
            orders[i].delivery = date;
            localStorage.setItem("orders", JSON.stringify(orders));
            displayOrders();
        }

        /* STATUS */
        function markDelivered(i) {
            orders[i].status = "Delivered";
            localStorage.setItem("orders", JSON.stringify(orders));
            displayOrders();
        }

        /* DELETE ORDER */
        function deleteOrder(i) {
            if (confirm("Delete this order?")) {
                orders.splice(i, 1);
                localStorage.setItem("orders", JSON.stringify(orders));
                displayOrders();
            }
        }

        /* INIT */
        displayProducts();
        displayOrders();
    </script>
    <script>
        function loadNotifications() {
            let notifications = JSON.parse(localStorage.getItem("notifications")) || [];
            let box = document.getElementById("notifyList");

            if (notifications.length === 0) {
                box.innerHTML = "<p>No notifications</p>";
                return;
            }

            box.innerHTML = "";

            notifications.reverse().forEach(n => {
                box.innerHTML += `
      <div style="background:#fff0f3;padding:10px;margin:5px 0;border-radius:8px;">
        ${n.message}<br>
        <small>${n.time}</small>
      </div>
    `;
            });
        }

        loadNotifications();
    </script>
    <script>
        function clearNotify() {
            localStorage.removeItem("notifications");
            loadNotifications();
        }
    </script>
    <script>let user = JSON.parse(localStorage.getItem("user"));

        if (!user) {
            alert("Please login first!");
            window.location.href = "login.html";
        }

        // 👑 ADMIN CHECK
        else if (user.email !== "admin@gmail.com") {
            alert("Access denied! Admin only ❌");
            window.location.href = "index.html";
        }
    </script>
    <script>function goHome() {
            window.location.href = "index.html";
        }</script>

</body>

</html>
