<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — Bakeit</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/shared.css">
  <script src="scripts/firebase-config.js"></script>
  <style>
    body{min-height:100vh;background:url('images/bg.png') center/cover;animation:bgKen 20s ease-in-out infinite alternate;}
    @keyframes bgKen{from{background-position:center top;}to{background-position:center bottom;}}
    .page-body{padding-top:var(--nav-h);min-height:100vh;display:flex;align-items:center;justify-content:center;padding-bottom:40px;}
    .profile-card{background:rgba(255,255,255,.94);backdrop-filter:blur(20px);border-radius:var(--radius-xl);padding:40px;width:90%;max-width:420px;box-shadow:var(--shadow-xl);text-align:center;}
    .avatar-wrap{position:relative;display:inline-block;margin-bottom:20px;}
    .avatar{width:100px;height:100px;border-radius:50%;object-fit:cover;border:4px solid var(--rose);box-shadow:0 6px 20px rgba(232,85,109,.3);}
    .avatar-edit{position:absolute;bottom:2px;right:2px;width:28px;height:28px;background:var(--rose);border-radius:50%;border:2px solid white;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;transition:all .2s;}
    .avatar-edit:hover{background:var(--rose-deep);}
    .profile-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--dark);margin-bottom:4px;}
    .profile-email{font-size:14px;color:var(--mid);margin-bottom:20px;}
    .info-row{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--cream);border-radius:var(--radius);margin-bottom:10px;text-align:left;}
    .info-row .icon{font-size:18px;}
    .info-row .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
    .info-row .value{font-size:14px;font-weight:500;color:var(--dark);}
    .divider{height:1px;background:var(--border);margin:20px 0;}
    .actions{display:flex;flex-direction:column;gap:10px;}
    .file-name{font-size:12px;color:var(--muted);margin-top:6px;min-height:16px;}
  </style>
</head>
<body>
<nav class="nav" id="navbar" style="background:rgba(253,248,240,.95);">
  <a class="nav-logo" href="index.html"><img src="images/logo.png"><span class="nav-brand">Bakeit</span></a>
  <div class="nav-right">
    <button class="btn-ghost btn-sm" onclick="location.href='myorders.html'">My Orders</button>
    <button class="btn-ghost btn-sm" onclick="logout()">Logout</button>
  </div>
</nav>
<div class="page-body">
  <div class="profile-card">
    <div class="avatar-wrap">
      <img id="avatarImg" class="avatar" src="images/user.png" alt="Profile">
      <div class="avatar-edit" onclick="document.getElementById('fileInput').click()">✏️</div>
    </div>
    <div class="profile-name" id="pName">—</div>
    <div class="profile-email" id="pEmail">—</div>

    <div class="info-row"><div class="icon">📞</div><div><div class="label">Mobile</div><div class="value" id="pMobile">—</div></div></div>

    <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="previewImage(this)">
    <div class="file-name" id="fileName"></div>

    <div class="divider"></div>
    <div class="actions">
      <button class="btn-primary btn-full" onclick="saveImage()">💾 Save Profile Image</button>
      <button class="btn-ghost btn-full" onclick="location.href='myorders.html'">📦 My Orders</button>
      <button class="btn-ghost btn-full" onclick="logout()">🚪 Logout</button>
    </div>
  </div>
</div>
<script src="scripts/shared.js"></script>
<script>
  const user=requireAuth();
  document.getElementById('pName').textContent=(user.first||'')+' '+(user.last||'');
  document.getElementById('pEmail').textContent=user.email||'—';
  document.getElementById('pMobile').textContent=user.mobile||'—';
  if(user.image)document.getElementById('avatarImg').src=user.image;

  function previewImage(input){
    const file=input.files[0];
    if(!file)return;
    document.getElementById('fileName').textContent=file.name;
    const reader=new FileReader();
    reader.onload=e=>document.getElementById('avatarImg').src=e.target.result;
    reader.readAsDataURL(file);
  }
  function saveImage(){
    const file=document.getElementById('fileInput').files[0];
    if(!file){showToast('Please choose an image first.','error');return;}
    const reader=new FileReader();
    reader.onload=e=>{
      const u=getUser();
      u.image=e.target.result;
      localStorage.setItem('user',JSON.stringify(u));
      // update in users list too
      const users=JSON.parse(localStorage.getItem('users'))||[];
      const idx=users.findIndex(x=>x.email===u.email);
      if(idx>-1){users[idx]=u;localStorage.setItem('users',JSON.stringify(users));}
      showToast('Profile image updated!','success');
    };
    reader.readAsDataURL(file);
  }
</script>
</body>
</html>
