<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Bakeit</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Poppins;
        }

        body {
            background: #fff7f8;
        }

        /* LAYOUT */
        .container {
            max-width: 1000px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        /* BOX */
        .box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        /* INPUT */
        input,
        select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: #ff5c7a;
        }

        /* PHONE */
        .phone {
            display: flex;
            gap: 10px;
        }

        .phone select {
            width: 30%;
        }

        .phone input {
            width: 70%;
        }

        /* BUTTON */
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: #ff5c7a;
            color: white;
            margin-top: 10px;
            cursor: pointer;
        }

        .btn-outline {
            background: white;
            border: 2px solid #ff5c7a;
            color: #ff5c7a;
        }

        /* POPUP */
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            display: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .popup .btn {
            margin-top: 10px;
        }
      /* 📱 CHECKOUT MOBILE FIX */
@media (max-width: 768px){

  .container{
    flex-direction: column;
    align-items: center;
    padding: 10px;
  }

  .box{
    width: 100%;
    max-width: 95%;
    margin-bottom: 20px;
  }

  /* PHONE INPUT FIX */
  .phone{
    display: flex;
    gap: 10px;
  }

  .phone select{
    width: 35%;
  }

  .phone input{
    width: 65%;
  }

  /* BUTTON FULL WIDTH */
  .btn{
    width: 100%;
  }

}

    </style>
</head>
<div class="top-bar">
    <button class="home-btn" onclick="goHome()">🏠 Home</button>
</div>

<body>

    <h2 style="text-align:center;margin-top:20px;">Checkout</h2>

    <div class="container">

        <!-- LEFT -->
        <div class="box">

            <h3>Delivery Details</h3>

            <input type="text" id="name" placeholder="Full Name">

            <input type="text" id="house" placeholder="House Number / Street">
            <input type="text" id="city" placeholder="City">
            <input type="text" id="state" placeholder="State">

            <input type="text" id="postal" placeholder="Postal Code">

            <div class="phone">
                <select id="country">
                    <option value="+94">🇱🇰 +94</option>
                    <option value="+91">🇮🇳 +91</option>
                    <option value="+1">🇺🇸 +1</option>
                </select>

                <input type="text" id="mobile" placeholder="Phone Number">
            </div>

            <h3>Payment</h3>

            <button class="btn" onclick="placeOrder()">Cash on Delivery</button>
            <button class="btn btn-outline">Card Payment (Coming Soon)</button>

        </div>

        <!-- RIGHT -->
        <div class="box">
            <h3>Your Order</h3>

            <div id="orderItems"></div>
            <h3 id="total"></h3>

        </div>

    </div>

    <!-- POPUP -->
    <div id="popup" class="popup">
        <h2>🎉 Thank You!</h2>
        <p>Your order has been placed</p>

        <button class="btn" onclick="goHome()">Go Home</button>
        <button class="btn btn-outline" onclick="goOrders()">My Orders</button>
    </div>

    <script>
        // LOAD CART
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let orders = JSON.parse(localStorage.getItem("orders")) || [];

        function loadOrder() {
            let itemsBox = document.getElementById("orderItems");
            let total = 0;

            cart.forEach(item => {
                total += item.price * item.qty;

                itemsBox.innerHTML += `
      <p>${item.name} x ${item.qty} - Rs.${item.price * item.qty}</p>
    `;
            });

            document.getElementById("total").innerText = "Total: Rs." + total;
        }
        loadOrder();

        // ONLY NUMBER INPUT
        document.getElementById("mobile").addEventListener("input", function () {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        // PLACE ORDER
        function placeOrder() {

            let name = document.getElementById("name").value;
            let house = document.getElementById("house").value;
            let city = document.getElementById("city").value;
            let state = document.getElementById("state").value;
            let postal = document.getElementById("postal").value;
            let mobile = document.getElementById("mobile").value;
            let country = document.getElementById("country").value;

            if (!name || !house || !city || !state || !mobile) {
                alert("Please fill all fields!");
                return;
            }

            // Sri Lanka validation
            if (country === "+94" && mobile.length !== 10) {
                alert("Sri Lanka number must be 10 digits!");
                return;
            }

            let total = cart.reduce((sum, i) => sum + i.price * i.qty, 0);
            let user = JSON.parse(localStorage.getItem("user"));

            orders.push({
                name,
                email: user.email,
                address: house + ", " + city + ", " + state,
                postal,
                mobile: country + mobile,
                items: cart,
                total,
                status: "Pending",
                delivery: ""
            });

            localStorage.setItem("orders", JSON.stringify(orders));
            localStorage.removeItem("cart");

            document.getElementById("popup").style.display = "block";
        }

        // NAVIGATION
        function goHome() {
            window.location.href = "index.html";
        }

        function goOrders() {
            window.location.href = "myorders.html";
        }
    </script>

</body>
<script>// 🔐 LOGIN PROTECTION
let user = JSON.parse(localStorage.getItem("user"));

if (!user) {
    alert("Please login first!");
    window.location.href = "login.html";
}</script>

</html>
