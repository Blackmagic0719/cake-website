<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - Bakeit</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="scripts/firebase-config.js"></script>
</head>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
  }

  body {
    background: #fff7f8;
    color: #333;
  }

  .top-bar {
    display: flex;
    justify-content: flex-end;
    padding: 15px 20px;
  }

  .home-btn {
    background: #ff5c7a;
    color: white;
    border: none;
    padding: 8px 18px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: 500;
  }

  .container {
    max-width: 1000px;
    margin: 20px auto;
    display: flex;
    gap: 30px;
    padding: 0 20px;
  }

  .box {
    background: white;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
    flex: 1;
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #ff5c7a;
  }

  h3 {
    margin-bottom: 15px;
    font-size: 18px;
    border-bottom: 2px solid #fff1f3;
    padding-bottom: 5px;
  }

  input,
  select {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid #ddd;
    outline: none;
  }

  input:focus {
    border-color: #ff5c7a;
  }

  .phone {
    display: flex;
    gap: 10px;
  }

  .phone select {
    width: 35%;
  }

  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 30px;
    background: #ff5c7a;
    color: white;
    margin-top: 10px;
    cursor: pointer;
    font-weight: 600;
    font-size: 16px;
    transition: 0.3s;
  }

  .btn:hover {
    background: #e04b65;
  }

  .btn-outline {
    background: white;
    border: 2px solid #ff5c7a;
    color: #ff5c7a;
  }

  .btn-outline:hover {
    background: #fff1f3;
  }

  .order-item {
    border-bottom: 1px solid #eee;
    padding: 12px 0;
  }

  .price-pending {
    color: #ff5c7a;
    font-weight: 600;
    font-size: 14px;
  }

  .popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    display: none;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
    z-index: 1000;
    width: 90%;
    max-width: 400px;
  }

  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    display: none;
    z-index: 999;
  }

  @media (max-width: 768px) {
    .container {
      flex-direction: column;
    }
  }
</style>
</head>

<body>

  <div class="top-bar">
    <button class="home-btn" onclick="goHome()">🏠 Home</button>
  </div>

  <h2>Checkout</h2>

  <div class="container">
    <div class="box">
      <h3>Delivery Details</h3>
      <input type="text" id="name" placeholder="Full Name">
      <input type="text" id="house" placeholder="House Number / Street">
      <input type="text" id="city" placeholder="City">
      <input type="text" id="state" placeholder="State">
      <input type="text" id="postal" placeholder="Postal Code">

      <div class="phone">
        <select id="country">
          <option value="+94">🇱🇰 +94</option>
          <option value="+91">🇮🇳 +91</option>
          <option value="+1">🇺🇸 +1</option>
        </select>
        <input type="text" id="mobile" placeholder="Phone Number">
      </div>

      <h3>Payment</h3>
      <button class="btn" onclick="placeOrder()">Cash on Delivery</button>
      <button class="btn btn-outline" style="opacity: 0.6; cursor: not-allowed;">Card Payment (Coming Soon)</button>
    </div>

    <div class="box">
      <h3>Your Order</h3>
      <div id="orderItems"></div>
      <h3 id="total" style="margin-top:20px; border-top: 2px solid #ff5c7a; padding-top:10px;">Total: Rs.0</h3>
    </div>
  </div>

  <div id="overlay" class="overlay"></div>
  <div id="popup" class="popup">
    <div id="popupContent"></div>
  </div>

  <script>
    // 🔐 LOGIN PROTECTION
    let user = JSON.parse(localStorage.getItem("user"));
    if (!user) {
      alert("Please login first!");
      window.location.href = "login.html";
    }

    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let orders = JSON.parse(localStorage.getItem("orders")) || [];

    // 1. LOAD ORDER SUMMARY
    function loadOrder() {
      let itemsBox = document.getElementById("orderItems");
      let total = 0;
      itemsBox.innerHTML = ""; // Clear box

      if (cart.length === 0) {
        itemsBox.innerHTML = "<p>Your cart is empty.</p>";
        return;
      }

      cart.forEach(item => {
        // If price is 0, it's a custom cake
        let isCustom = (item.price === 0 || !item.price);
        let itemTotal = isCustom ? 0 : (item.price * item.qty);
        let displayPrice = isCustom ? "Price Pending (Admin will contact you)" : "Rs." + itemTotal;

        total += itemTotal;

        itemsBox.innerHTML += `
                    <div class="order-item">
                        <p><strong>${item.name}</strong> x ${item.qty}</p>
                        ${item.details ? `<small style="color:#777;">Note: ${item.details}</small>` : ""}
                        <p class="price-pending">${displayPrice}</p>
                    </div>
                `;
      });

      document.getElementById("total").innerText = "Total: Rs." + total;
    }

    // 2. PLACE ORDER LOGIC
    function placeOrder() {
      let name = document.getElementById("name").value;
      let house = document.getElementById("house").value;
      let city = document.getElementById("city").value;
      let state = document.getElementById("state").value;
      let mobile = document.getElementById("mobile").value;
      let country = document.getElementById("country").value;

      if (!name || !house || !city || !state || !mobile) {
        alert("Please fill all required fields!");
        return;
      }

      // Generate Random ID (BK-XXXXX)
      let randomID = "BK-" + Math.floor(10000 + Math.random() * 90000);
      let total = cart.reduce((sum, i) => sum + (i.price || 0) * i.qty, 0);

      let newOrder = {
        id: randomID,
        name: name,
        email: user.email,
        address: `${house}, ${city}, ${state}`,
        mobile: country + mobile,
        items: cart,
        total: total,
        status: "Pending",
        date: new Date().toLocaleString(),
        priceConfirmed: false
      };

      orders.push(newOrder);
      localStorage.setItem("orders", JSON.stringify(orders));
      localStorage.removeItem("cart");

      // Show Success Popup
      showPopup(randomID);
    }

    function showPopup(id) {
      let content = document.getElementById("popupContent");
      content.innerHTML = `
                <h2 style="font-size:40px;">🎉</h2>
                <h2>Order Placed!</h2>
                <p>Your Order ID: <strong style="color:#ff5c7a;">${id}</strong></p>
                <p style="font-size:13px; color:#666; margin: 10px 0;">Please keep this ID for tracking.</p>
                <button class="btn" onclick="goHome()">Go Home</button>
                <button class="btn btn-outline" onclick="goOrders()">My Orders</button>
            `;
      document.getElementById("overlay").style.display = "block";
      document.getElementById("popup").style.display = "block";
    }

    function goHome() { window.location.href = "index.html"; }
    function goOrders() { window.location.href = "myorders.html"; }

    // Initialize
    loadOrder();

    // Phone number numbers-only restriction
    document.getElementById("mobile").addEventListener("input", function () {
      this.value = this.value.replace(/[^0-9]/g, '');
    });
  </script>
</body>

</html>
