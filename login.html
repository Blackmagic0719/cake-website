<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Bakeit</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/shared.css">
  <script src="scripts/firebase-config.js"></script>
  <style>
    body { min-height:100vh; display:flex; }
    .left { flex:1; position:relative; overflow:hidden; display:none; }
    @media(min-width:860px){.left{display:block;}}
    .left-bg { position:absolute; inset:0; background:url('images/bg.png') center/cover; animation:bgKen 22s ease-in-out infinite alternate; }
    @keyframes bgKen{from{background-position:center top;}to{background-position:center bottom;}}
    .left-ov { position:absolute; inset:0; background:linear-gradient(155deg,rgba(26,18,24,.82),rgba(26,18,24,.5)); }
    .left-body { position:relative; z-index:2; height:100%; display:flex; flex-direction:column; justify-content:space-between; padding:48px; }
    .brand-link { display:flex; align-items:center; gap:10px; text-decoration:none; }
    .brand-link img { height:34px; }
    .brand-link span { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:600; color:white; }
    .left-tag h2 { font-family:'Cormorant Garamond',serif; font-size:clamp(34px,4vw,50px); font-weight:300; color:white; line-height:1.2; margin-bottom:14px; }
    .left-tag h2 em { font-style:italic; color:#f5d5dc; }
    .left-tag p { font-size:14px; color:rgba(255,255,255,.58); line-height:1.7; }
    .left-bot { font-size:12px; color:rgba(255,255,255,.25); }

    .right { width:100%; max-width:520px; flex-shrink:0; background:var(--cream); display:flex; align-items:center; justify-content:center; padding:48px 40px; }
    @media(max-width:860px){.right{max-width:100%;}}
    .fw { width:100%; max-width:360px; }
    .mob-logo { display:flex; align-items:center; gap:10px; margin-bottom:36px; text-decoration:none; }
    @media(min-width:860px){.mob-logo{display:none;}}
    .mob-logo img { height:32px; }
    .mob-logo span { font-family:'Cormorant Garamond',serif; font-size:24px; font-weight:600; color:var(--rose); }
    .fw h1 { font-family:'Cormorant Garamond',serif; font-size:38px; font-weight:400; color:var(--dark); margin-bottom:6px; }
    .fw > p { font-size:14px; color:var(--mid); margin-bottom:32px; }
    .err { background:var(--rose-soft); border:1px solid rgba(232,85,109,.2); border-radius:var(--radius); padding:11px 15px; font-size:13px; color:var(--rose-deep); margin-bottom:18px; display:none; align-items:center; gap:8px; }
    .err.show { display:flex; animation:shake .4s ease; }
    @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
    .submit-btn { width:100%; padding:14px; background:var(--rose); color:white; border:none; border-radius:var(--radius-full); font-family:'DM Sans',sans-serif; font-size:15px; font-weight:500; cursor:pointer; transition:all .3s; margin-top:6px; position:relative; overflow:hidden; }
    .submit-btn:hover { background:var(--rose-deep); transform:translateY(-1px); box-shadow:0 8px 24px rgba(232,85,109,.4); }
    .btn-inner { display:flex; align-items:center; justify-content:center; gap:10px; }
    .loading-inner { display:none; position:absolute; inset:0; background:var(--rose-deep); align-items:center; justify-content:center; }
    .loading-inner.show { display:flex; }
    .form-foot { margin-top:26px; text-align:center; font-size:14px; color:var(--mid); }
    .form-foot a { color:var(--rose); text-decoration:none; font-weight:500; }
    .form-foot a:hover { text-decoration:underline; }
  </style>
</head>
<body>
<div class="left">
  <div class="left-bg"></div><div class="left-ov"></div>
  <div class="left-body">
    <a class="brand-link" href="index.html"><img src="images/logo.png"><span>Bakeit</span></a>
    <div class="left-tag">
      <h2>Welcome<br><em>Back</em></h2>
      <p>Your next favourite cake is just a login away.</p>
    </div>
    <div class="left-bot">© 2026 Bakeit Cake Shop</div>
  </div>
</div>
<div class="right">
  <div class="fw">
    <a class="mob-logo" href="index.html"><img src="images/logo.png"><span>Bakeit</span></a>
    <h1>Sign In</h1>
    <p>Good to see you again ✨</p>
    <div class="err" id="err"><span>❌</span><span id="errTxt">Invalid credentials.</span></div>
    <div class="field"><label>Email Address</label><input type="email" id="email" placeholder="you@example.com" autocomplete="email"></div>
    <div class="field"><label>Password</label><input type="password" id="pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="submit-btn" id="loginBtn" onclick="doLogin()">
      <div class="btn-inner">Sign In</div>
      <div class="loading-inner" id="loader"><div class="spinner"></div></div>
    </button>
    <div class="form-foot">Don't have an account? <a href="signup.html">Create one</a></div>
  </div>
</div>
<script src="scripts/shared.js"></script>
<script>
  // Redirect if already logged in
  if(getUser()) location.href='index.html';

  function doLogin(){
    const email=document.getElementById('email').value.trim();
    const pass=document.getElementById('pass').value;
    const err=document.getElementById('err');
    const errTxt=document.getElementById('errTxt');
    const loader=document.getElementById('loader');
    err.classList.remove('show');
    if(!email||!pass){errTxt.textContent='Please fill in all fields.';err.classList.add('show');return;}
    loader.classList.add('show');
    setTimeout(()=>{
      loader.classList.remove('show');
      if(email==='admin@gmail.com'&&pass==='1234'){
        localStorage.setItem('user',JSON.stringify({email,first:'Admin',last:'',mobile:'',image:'',role:'admin'}));
        location.href='admin.html';return;
      }
      const users=JSON.parse(localStorage.getItem('users'))||[];
      const found=users.find(u=>u.email===email&&u.pass===pass);
      if(found){localStorage.setItem('user',JSON.stringify(found));location.href='index.html';}
      else{errTxt.textContent='Invalid email or password. Please try again.';err.classList.add('show');}
    },800);
  }
</script>
</body>
</html>
