<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bakeit</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="scripts/firebase-config.js"></script>
</head>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        background: url('images/main.png') no-repeat center/cover;
        display: flex;
        flex-direction: column;
    }

    body {
        background: url('images/bg.png') no-repeat center/cover;
        animation: moveBg 20s infinite alternate ease-in-out;
    }

    @keyframes moveBg {
        0% {
            background-position: center top;
        }

        100% {
            background-position: center bottom;
        }
    }

    /* NAVBAR */
    header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 40px;
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(10px);
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .logo img {
        height: 40px;
    }

    .logo span {
        font-weight: 700;
        color: #ff5c7a;
    }

    /* CENTER BOX */
    .container {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .box {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(15px);
        padding: 40px;
        border-radius: 20px;
        width: 350px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        text-align: center;
    }

    h2 {
        margin-bottom: 25px;
    }

    /* INPUT */
    input {
        width: 100%;
        padding: 14px;
        margin: 12px 0;
        border-radius: 10px;
        border: 1px solid #ddd;
        font-size: 14px;
    }

    /* BUTTON */
    button {
        width: 100%;
        padding: 14px;
        background: #ff5c7a;
        color: white;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        font-weight: 600;
        margin-top: 10px;
    }

    button:hover {
        background: #e14a68;
    }

    a {
        display: block;
        margin-top: 15px;
        color: #ff5c7a;
        text-decoration: none;
    }

    /* FOOTER */
    footer {
        text-align: center;
        padding: 10px;
        background: rgba(255, 255, 255, 0.8);
    }
</style>
</head>

<body>

    <header>
        <div class="logo">
            <a href="index.html"><img src="images/logo.png"></a>
            <span>Bakeit</span>
        </div>
    </header>

    <div class="container">
        <div class="box">
            <h2>Welcome Back</h2>

            <input type="email" id="loginEmail" placeholder="Email">
            <input type="password" id="loginPass" placeholder="Password">
            <button onclick="login()">Login</button>

            <a href="signup.html">Create new account</a>
        </div>
    </div>
    <script>function login() {

            let email = document.getElementById("loginEmail").value;
            let password = document.getElementById("loginPass").value;

            // 👑 ADMIN LOGIN (CHECK FIRST)
            if (email === "admin@gmail.com" && password === "1234") {
                localStorage.setItem("user", JSON.stringify({ email }));
                window.location.href = "admin.html";
                return;
            }

            // 👤 NORMAL USERS
            let users = JSON.parse(localStorage.getItem("users")) || [];

            let foundUser = users.find(u => u.email === email && u.pass === password);

            if (foundUser) {
                localStorage.setItem("user", JSON.stringify(foundUser));
                window.location.href = "index.html";
            } else {
                alert("Invalid email or password ❌");
            }
        }</script>


</body>

</html>
